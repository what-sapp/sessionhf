<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOVA • Pairing</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0b0e;
      color: #e8e8ed;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(139, 92, 246, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 60%),
        #0b0b0e;
      z-index: 0;
    }

    .bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.06;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(18, 18, 24, 0.85);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border-radius: 32px;
      padding: 2.5rem 2rem 2rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      transition: border-color 0.3s ease;
    }

    .card:hover {
      border-color: rgba(139, 92, 246, 0.15);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.25);
    }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f0f0f5 60%, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 400;
      margin-top: -0.1rem;
      margin-bottom: 1.75rem;
      letter-spacing: 0.01em;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 0.5rem;
    }

    .form-group label .optional {
      font-weight: 400;
      text-transform: none;
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.65rem;
      margin-left: 0.4rem;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-wrapper:focus-within {
      border-color: rgba(139, 92, 246, 0.4);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.08);
    }

    .input-wrapper .prefix {
      font-size: 0.85rem;
      font-weight: 600;
      color: #a78bfa;
      padding: 0 0 0 1rem;
      white-space: nowrap;
      letter-spacing: 0.02em;
      opacity: 0.7;
    }

    .input-wrapper .prefix-phone {
      font-size: 0.95rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.3);
      padding: 0 0 0 1rem;
      white-space: nowrap;
    }

    .input-wrapper input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: transparent;
      border: none;
      outline: none;
      color: #e8e8ed;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      font-weight: 450;
      letter-spacing: 0.01em;
    }

    .input-wrapper input::placeholder {
      color: rgba(255, 255, 255, 0.2);
      font-weight: 400;
    }

    .input-wrapper .icon {
      padding: 0 1rem 0 0;
      color: rgba(255, 255, 255, 0.15);
      font-size: 0.9rem;
    }

    .key-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      background: rgba(139, 92, 246, 0.04);
      border: 1px solid rgba(139, 92, 246, 0.06);
      font-size: 0.85rem;
      font-weight: 450;
      color: rgba(255, 255, 255, 0.3);
      min-height: 3rem;
      transition: all 0.3s ease;
      margin-top: -0.25rem;
      margin-bottom: 0.25rem;
    }

    .key-preview.active {
      color: #c4b5fd;
      border-color: rgba(139, 92, 246, 0.2);
      background: rgba(139, 92, 246, 0.08);
    }

    .key-preview .key-value {
      color: #e8e8ed;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .key-preview .fa-key {
      opacity: 0.3;
      font-size: 0.75rem;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      margin: 1.25rem 0 1.5rem;
    }

    .btn-primary {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      box-shadow: 0 8px 28px rgba(139, 92, 246, 0.2);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 36px rgba(139, 92, 246, 0.3);
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    }

    .btn-primary:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .btn-primary.loading .spinner {
      display: block;
    }

    .btn-primary.loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      margin-top: 1.25rem;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 450;
      text-align: center;
      min-height: 2.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
    }

    .status:empty {
      display: none;
    }

    .status.error {
      color: #f87171;
      background: rgba(248, 113, 113, 0.06);
      border: 1px solid rgba(248, 113, 113, 0.1);
    }

    .status.success {
      color: #a78bfa;
      background: rgba(167, 139, 250, 0.06);
      border: 1px solid rgba(167, 139, 250, 0.1);
    }

    .status .code-highlight {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      color: #c4b5fd;
    }

    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.1);
      letter-spacing: 0.04em;
    }

    @media (max-width: 480px) {
      .card {
        padding: 1.75rem 1.25rem;
        border-radius: 24px;
      }
      .title {
        font-size: 1.25rem;
      }
      .input-wrapper input {
        font-size: 0.9rem;
        padding: 0.75rem 0.75rem;
      }
      .input-wrapper .prefix,
      .input-wrapper .prefix-phone {
        padding-left: 0.75rem;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="https://files.catbox.moe/fh2lhl.mp4" type="video/mp4" />
  </video>

  <div class="card">
    <div class="header">
      <div class="logo-icon">✦</div>
      <span class="title">NOVA</span>
    </div>
    <p class="subtitle">Generate your pairing code</p>

    <div class="form-group">
      <label>Access Key Name <span class="optional">(optional)</span></label>
      <div class="input-wrapper">
        <span class="prefix">NOVA_</span>
        <input
          type="text"
          id="custom-name"
          placeholder="yourname"
          maxlength="40"
          autocomplete="off"
          spellcheck="false"
        />
        <span class="icon"><i class="fas fa-pen"></i></span>
      </div>
    </div>

    <div class="key-preview" id="key-preview">
      <i class="fas fa-key"></i>
      <span>Enter a name or leave blank for random</span>
    </div>

    <hr class="divider" />

    <div class="form-group">
      <label>Phone Number</label>
      <div class="input-wrapper">
        <span class="prefix-phone">+</span>
        <input
          type="tel"
          id="phone-number"
          placeholder="256747122756"
          maxlength="15"
          autocomplete="tel"
        />
        <span class="icon"><i class="fas fa-phone"></i></span>
      </div>
    </div>

    <button class="btn-primary" id="pair-btn">
      <span class="spinner"></span>
      <span class="btn-text"><i class="fas fa-bolt" style="opacity:0.7;"></i> Get Code</span>
    </button>

    <div class="status" id="status"></div>
    <div class="footer">secure • encrypted</div>
  </div>

  <script>
    (function() {
      const btn = document.getElementById('pair-btn');
      const status = document.getElementById('status');
      const phoneInput = document.getElementById('phone-number');
      const nameInput = document.getElementById('custom-name');
      const preview = document.getElementById('key-preview');

      phoneInput.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '').slice(0, 15);
      });

      nameInput.addEventListener('input', function() {
        this.value = this.value.replace(/[^a-zA-Z0-9_\-]/g, '').slice(0, 40);
        updatePreview();
      });

      function updatePreview() {
        const name = nameInput.value.trim();
        if (name) {
          preview.innerHTML = `
            <i class="fas fa-key"></i> 
            <span>Your key: </span>
            <span class="key-value">NOVA_${name}</span>
          `;
          preview.className = 'key-preview active';
        } else {
          preview.innerHTML = `
            <i class="fas fa-key"></i> 
            <span>Random key will be generated</span>
          `;
          preview.className = 'key-preview';
        }
      }

      function randomKey() {
        const n = num => String(num).padStart(2, '0');
        return `NOVA_${n(Math.floor(Math.random() * 100))}_${n(Math.floor(Math.random() * 100))}_${n(Math.floor(Math.random() * 100))}`;
      }

      btn.addEventListener('click', async function() {
        const phone = phoneInput.value.replace(/\D/g, '');
        const name = nameInput.value.trim();

        if (!phone || phone.length < 8) {
          status.className = 'status error';
          status.innerHTML = '<i class="fas fa-exclamation-circle"></i> Enter a valid phone number';
          return;
        }

        btn.classList.add('loading');
        btn.disabled = true;
        status.className = 'status';
        status.textContent = '';

        try {
          let url = `/pair?phone=${phone}`;
          if (name) {
            url += `&name=${encodeURIComponent(name)}`;
          }

          const res = await fetch(url);
          const data = await res.json();

          btn.classList.remove('loading');
          btn.disabled = false;

          if (data.error) {
            status.className = 'status error';
            status.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${data.error}`;
          } else if (data.code) {
            status.className = 'status success';
            status.innerHTML = `
              <i class="fas fa-check-circle"></i>
              Pairing code: <span class="code-highlight">${data.code}</span>
            `;
          }
        } catch (_) {
          btn.classList.remove('loading');
          btn.disabled = false;
          status.className = 'status error';
          status.innerHTML = '<i class="fas fa-exclamation-circle"></i> Connection error. Try again.';
        }
      });

      [phoneInput, nameInput].forEach(el => {
        el.addEventListener('keydown', e => {
          if (e.key === 'Enter') btn.click();
        });
      });

      updatePreview();
    })();
  </script>
</body>
</html>
